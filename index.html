<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UniSearch</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Mulish:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #0d0d1a);
      --tg-text: var(--tg-theme-text-color, #ffffff);
      --tg-hint: var(--tg-theme-hint-color, #9999aa);
      --tg-btn: var(--tg-theme-button-color, #5271ff);
      --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
    }

    body {
      margin: 0; padding: 0;
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: 'Mulish', sans-serif;
    }

    .container { padding: 20px; max-width: 500px; margin: 0 auto; }
    h1, h2 { font-family: 'Unbounded', sans-serif; text-transform: uppercase; }
    
    .btn {
      display: block; width: 100%; padding: 15px; margin: 10px 0;
      background: var(--tg-btn); color: var(--tg-btn-text);
      border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
    }

    input {
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
      border: 1px solid var(--tg-hint); background: rgba(255,255,255,0.05); color: #fff;
      box-sizing: border-box;
    }

    .uni-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .uni-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; color: #6c8fff; }
    
    .badge {
      display: inline-block; padding: 4px 8px; background: rgba(82, 113, 255, 0.2);
      border-radius: 6px; font-size: 0.8rem; margin-right: 5px; margin-bottom: 5px;
    }

    .uni-link {
      display: inline-block; margin-top: 10px; color: #5271ff; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [step, setStep] = React.useState("start");
      const [filters, setFilters] = React.useState({});
      const [allUnis, setAllUnis] = React.useState([]); //вузы из JSON
      const [results, setResults] = React.useState([]); //светлое отфильтрованное

      //загружаем базу
      React.useEffect(() => {
        fetch('universities.json')
          .then(response => response.json())
          .then(data => setAllUnis(data))
          .catch(err => console.error("Ошибка загрузки базы:", err));
      }, []);

      const nextStep = (key, val, next) => {
        const newFilters = { ...filters, [key]: val };
        setFilters(newFilters);
        
        if (next === "results") {
          //логика фильтра
          const filtered = allUnis.filter(u => {
            const matchField = u.fields.includes(newFilters.field);
            const matchCountry = newFilters.country === "Любая страна" || u.country === newFilters.country;
            const matchIelts = u.ielts_min <= (parseFloat(newFilters.ielts) || 0);
            const matchGpa = u.gpa_min <= (parseFloat(newFilters.gpa) || 0);
            
            let matchBudget = true;
            if (newFilters.budget === "Бесплатно") matchBudget = u.tuition_usd === 0;
            else if (newFilters.budget === "до $5000") matchBudget = u.tuition_usd <= 5000;
            else if (newFilters.budget === "до $15000") matchBudget = u.tuition_usd <= 15000;
            else if (newFilters.budget === "до $30000") matchBudget = u.tuition_usd <= 30000;

            return matchField && matchCountry && matchIelts && matchGpa && matchBudget;
          });
          
          setResults(filtered);
          setStep("results");
        } else {
          setStep(next);
        }
      };

      //отображение карточек 
      return (
        <div className="container">
          {step === "start" && (
            <div style={{textAlign: 'center'}}>
              <h1>UniSearch</h1>
              <button className="btn" onClick={() => setStep("field")}>Начать подбор</button>
            </div>
          )}

          {step === "field" && (
            <div>
              <h2>Сфера обучения:</h2>
              {["Computer Science", "Medicine", "Economics", "Engineering", "Law", "Business"].map(f => (
                <button key={f} className="btn" onClick={() => nextStep("field", f, "country")}>{f}</button>
              ))}
            </div>
          )}

          {step === "country" && (
            <div>
              <h2>Страна:</h2>
              {["Germany", "Czech Republic", "Hungary", "Canada", "Australia", "Любая страна"].map(c => (
                <button key={c} className="btn" onClick={() => nextStep("country", c, "ielts")}>{c}</button>
              ))}
            </div>
          )}

          {step === "ielts" && (
            <div>
              <h2>IELTS:</h2>
              <input type="number" step="0.5" placeholder="6.5" id="ielts_input" />
              <button className="btn" onClick={() => nextStep("ielts", document.getElementById('ielts_input').value, "gpa")}>Далее</button>
            </div>
          )}

          {step === "gpa" && (
            <div>
              <h2>GPA:</h2>
              <input type="number" step="0.1" placeholder="3.5" id="gpa_input" />
              <button className="btn" onClick={() => nextStep("gpa", document.getElementById('gpa_input').value, "budget")}>Далее</button>
            </div>
          )}

          {step === "budget" && (
            <div>
              <h2>Бюджет:</h2>
              {["Бесплатно", "до $5000", "до $15000", "до $30000", "Любой"].map(b => (
                <button key={b} className="btn" onClick={() => nextStep("budget", b, "results")}>{b}</button>
              ))}
            </div>
          )}

          {step === "results" && (
            <div className="results-container">
              <h2>Найдено вариантов: {results.length}</h2>
              {results.length > 0 ? (
                results.map((uni, i) => (
                  <div className="uni-card" key={i}>
                    <div className="uni-name">{uni.name}</div>
                    <div className="uni-badges">
                      <span className="badge">📍 {uni.city}, {uni.country}</span>
                      <span className="badge">💰 {uni.tuition_usd === 0 ? "Бесплатно" : `$${uni.tuition_usd}/год`}</span>
                    </div>
                    <a href={uni.url} target="_blank" className="uni-link">Сайт вуза ↗️</a>
                  </div>
                ))
              ) : (
                <p>Попробуйте смягчить фильтры.</p>
              )}
              <button className="btn" onClick={() => setStep("start")}>Начать заново</button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
